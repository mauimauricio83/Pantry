<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pantry — Family Grocery List</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Pantry" />
<meta name="theme-color" content="#6E3B5C" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236E3B5C'/%3E%3Cpath d='M28 44h44l-5 30a6 6 0 0 1-6 5H39a6 6 0 0 1-6-5z' fill='none' stroke='%23F2F1EA' stroke-width='6' stroke-linejoin='round'/%3E%3Cpath d='M38 44v-6a12 12 0 0 1 24 0v6' fill='none' stroke='%23F2F1EA' stroke-width='6'/%3E%3Ccircle cx='42' cy='58' r='4' fill='%23F2F1EA'/%3E%3Ccircle cx='58' cy='58' r='4' fill='%23F2F1EA'/%3E%3C/svg%3E" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%236E3B5C'/%3E%3Cpath d='M28 44h44l-5 30a6 6 0 0 1-6 5H39a6 6 0 0 1-6-5z' fill='none' stroke='%23F2F1EA' stroke-width='6' stroke-linejoin='round'/%3E%3Cpath d='M38 44v-6a12 12 0 0 1 24 0v6' fill='none' stroke='%23F2F1EA' stroke-width='6'/%3E%3Ccircle cx='42' cy='58' r='4' fill='%23F2F1EA'/%3E%3Ccircle cx='58' cy='58' r='4' fill='%23F2F1EA'/%3E%3C/svg%3E" />
<style>
  :root{
    --bg:#F2F1EA;
    --bg-elevated:#FFFFFF;
    --ink:#201F1B;
    --ink-muted:#6B675D;
    --accent:#6E3B5C;
    --accent-ink:#FFFFFF;
    --accent-soft:#EFE1EA;
    --need:#B4622A;
    --need-soft:#F5E4D5;
    --stocked:#4C7A52;
    --stocked-soft:#E1EBE0;
    --border:#E1DED2;
    --shadow: 0 1px 2px rgba(32,31,27,0.06), 0 6px 16px rgba(32,31,27,0.05);
    --radius:14px;
    --cat-1:#6E3B5C; --cat-2:#3D6B7C; --cat-3:#8A6A2A; --cat-4:#4C7A52;
    --cat-5:#7A4B3A; --cat-6:#5A5A8A; --cat-7:#9C5A3A; --cat-8:#3A6E6E;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#171814; --bg-elevated:#212219; --ink:#EDEBE2; --ink-muted:#A6A296;
      --accent:#D791BE; --accent-ink:#231421; --accent-soft:#3A2733;
      --need:#E5924F; --need-soft:#3B2A1B; --stocked:#8FC492; --stocked-soft:#233024;
      --border:#34362B; --shadow:0 1px 2px rgba(0,0,0,0.3), 0 8px 20px rgba(0,0,0,0.35);
      --cat-1:#D791BE; --cat-2:#7FB6CC; --cat-3:#D6B15C; --cat-4:#8FC492;
      --cat-5:#C79176; --cat-6:#A6A6E0; --cat-7:#D69B76; --cat-8:#7FC7C7;
    }
  }
  :root[data-theme="dark"]{
    --bg:#171814; --bg-elevated:#212219; --ink:#EDEBE2; --ink-muted:#A6A296;
    --accent:#D791BE; --accent-ink:#231421; --accent-soft:#3A2733;
    --need:#E5924F; --need-soft:#3B2A1B; --stocked:#8FC492; --stocked-soft:#233024;
    --border:#34362B; --shadow:0 1px 2px rgba(0,0,0,0.3), 0 8px 20px rgba(0,0,0,0.35);
    --cat-1:#D791BE; --cat-2:#7FB6CC; --cat-3:#D6B15C; --cat-4:#8FC492;
    --cat-5:#C79176; --cat-6:#A6A6E0; --cat-7:#D69B76; --cat-8:#7FC7C7;
  }
  :root[data-theme="light"]{
    --bg:#F2F1EA; --bg-elevated:#FFFFFF; --ink:#201F1B; --ink-muted:#6B675D;
    --accent:#6E3B5C; --accent-ink:#FFFFFF; --accent-soft:#EFE1EA;
    --need:#B4622A; --need-soft:#F5E4D5; --stocked:#4C7A52; --stocked-soft:#E1EBE0;
    --border:#E1DED2; --shadow:0 1px 2px rgba(32,31,27,0.06), 0 6px 16px rgba(32,31,27,0.05);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:calc(24px + env(safe-area-inset-bottom));
  }
  .app{max-width:560px;margin:0 auto;padding:0 16px;}
  header.hero{
    position:sticky; top:0; z-index:20;
    background:var(--accent); color:var(--accent-ink);
    padding:calc(18px + env(safe-area-inset-top)) 20px 16px;
    border-radius:0 0 22px 22px;
    box-shadow:var(--shadow);
    margin-bottom:14px;
  }
  .hero-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .hero-title{font-size:21px; font-weight:700; letter-spacing:-0.01em; margin:0;}
  .hero-sub{font-size:12.5px; opacity:0.82; margin:2px 0 0; font-weight:500;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#8FE0A0;flex:none;box-shadow:0 0 0 3px rgba(255,255,255,0.18);}
  .sync-dot.off{background:#E0A08F;}
  .sync-dot.busy{background:#E0D08F; animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
  .sync-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;opacity:0.85;text-transform:uppercase;letter-spacing:0.04em;}

  .addbar{
    display:flex; gap:8px; margin-top:14px;
  }
  .addbar input[type="text"]{
    flex:1; min-width:0;
    border:none; border-radius:11px; padding:11px 13px;
    font-size:15px; background:rgba(255,255,255,0.16); color:var(--accent-ink);
  }
  .addbar input[type="text"]::placeholder{color:rgba(255,255,255,0.65);}
  .addbar select{
    border:none; border-radius:11px; padding:11px 8px;
    font-size:13px; background:rgba(255,255,255,0.16); color:var(--accent-ink);
    max-width:118px;
  }
  .addbar select option{color:#201F1B;}
  .addbar button{
    border:none; border-radius:11px; padding:0 16px;
    background:var(--accent-ink); color:var(--accent);
    font-size:20px; font-weight:700; line-height:1; cursor:pointer;
  }
  .addbar button:active{transform:scale(0.95);}

  .tabs{
    display:flex; gap:8px; margin:16px 0 12px;
    background:var(--bg-elevated); padding:5px; border-radius:12px; box-shadow:var(--shadow);
  }
  .tab{
    flex:1; border:none; background:transparent; padding:10px 8px; border-radius:9px;
    font-size:13.5px; font-weight:700; color:var(--ink-muted); cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .tab.active{background:var(--accent); color:var(--accent-ink);}
  .tab .count{
    font-variant-numeric:tabular-nums; font-size:11.5px; font-weight:700;
    background:rgba(0,0,0,0.08); border-radius:20px; padding:1px 7px;
  }
  .tab.active .count{background:rgba(255,255,255,0.22);}

  .search{
    width:100%; border:1px solid var(--border); background:var(--bg-elevated);
    border-radius:11px; padding:9px 12px; font-size:14px; color:var(--ink);
    margin-bottom:14px;
  }
  .search::placeholder{color:var(--ink-muted);}

  .category-group{margin-bottom:16px;}
  .category-head{
    display:flex; align-items:center; gap:8px; padding:0 4px 8px;
    font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;
    color:var(--ink-muted);
  }
  .cat-dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .category-head .cat-count{margin-left:auto; font-variant-numeric:tabular-nums; opacity:0.8;}

  .item-list{
    background:var(--bg-elevated); border-radius:var(--radius); box-shadow:var(--shadow);
  }
  .item-row{
    display:flex; align-items:center; gap:12px; padding:12px 14px;
    border-bottom:1px solid var(--border);
    transition:opacity .18s ease, transform .18s ease;
  }
  .item-row:first-child{border-top-left-radius:var(--radius); border-top-right-radius:var(--radius);}
  .item-row:last-child{border-bottom:none; border-bottom-left-radius:var(--radius); border-bottom-right-radius:var(--radius);}
  .item-row.leaving{opacity:0; transform:translateX(12px) scale(0.98);}

  .toggle{
    width:26px; height:26px; border-radius:50%; flex:none; cursor:pointer;
    border:2px solid var(--need); background:transparent;
    display:flex; align-items:center; justify-content:center;
    -webkit-tap-highlight-color:transparent;
  }
  .toggle svg{width:14px;height:14px;opacity:0;}
  .item-row[data-status="in"] .toggle{border-color:var(--stocked); background:var(--stocked);}
  .item-row[data-status="in"] .toggle svg{opacity:1; stroke:var(--bg-elevated);}

  .item-main{flex:1; min-width:0; display:flex; flex-direction:column; gap:1px;}
  .item-name{font-size:15.5px; font-weight:500; word-break:break-word;}
  .item-row[data-status="in"] .item-name{color:var(--ink-muted);}
  .item-notes{font-size:12px; color:var(--ink-muted); word-break:break-word;}
  .note-input{
    border:none; border-bottom:1px solid var(--border); background:transparent;
    font-size:12.5px; color:var(--ink); padding:2px 0; width:100%; font-family:inherit;
  }
  .note-input:focus{outline:none; border-color:var(--accent);}

  .del, .note-btn{
    border:none; background:transparent; color:var(--ink-muted); opacity:0.5;
    padding:6px; cursor:pointer; flex:none; border-radius:8px;
  }
  .del:hover{opacity:1; background:var(--need-soft); color:var(--need);}
  .note-btn:hover{opacity:1; background:var(--accent-soft); color:var(--accent);}
  .note-btn.has-note{opacity:0.9; color:var(--accent);}

  .empty{
    text-align:center; padding:44px 20px; color:var(--ink-muted);
  }
  .empty .big{font-size:34px; margin-bottom:8px;}
  .empty p{margin:2px 0; font-size:14px;}

  footer{
    text-align:center; color:var(--ink-muted); font-size:11.5px; padding:18px 10px 4px;
  }
  a.gh{color:var(--ink-muted);}

  @media (prefers-reduced-motion: reduce){
    .item-row, .sync-dot.busy{transition:none; animation:none;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="hero-row">
      <div>
        <p class="hero-title" id="listTitle">Pantry</p>
        <p class="hero-sub">Shared family grocery list</p>
      </div>
      <div class="sync-label"><span class="sync-dot off" id="syncDot"></span><span id="syncText">Local</span></div>
    </div>
    <div class="addbar">
      <input type="text" id="newItemName" placeholder="Add an item…" autocomplete="off" />
      <select id="newItemCategory"></select>
      <button id="addBtn" aria-label="Add item">+</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="out">Need to Buy <span class="count" id="outCount">0</span></button>
    <button class="tab" data-tab="in">In Stock <span class="count" id="inCount">0</span></button>
  </nav>

  <input type="text" class="search" id="searchBox" placeholder="Search items…" />

  <main id="listRoot"></main>

  <footer>Add to your Home Screen for quick access · works on iOS &amp; Android</footer>
</div>

<script>
(function(){
  "use strict";

  // ---- Configuration -------------------------------------------------
  // Leave API_URL empty to run in local (this-device-only) demo mode.
  // Paste your deployed Google Apps Script Web App URL here to sync the
  // whole family through one shared Google Sheet. See SETUP.md.
  var CONFIG = {
    API_URL: "",
    LIST_TITLE: "Pantry"
  };

  var CATEGORIES = ["Produce","Dairy & Eggs","Meat & Seafood","Bakery","Pantry","Frozen","Beverages","Snacks","Household","Personal Care","Other"];
  var CAT_COLORS = {};
  var palette = ["cat-1","cat-2","cat-3","cat-4","cat-5","cat-6","cat-7","cat-8"];
  CATEGORIES.forEach(function(c,i){ CAT_COLORS[c] = "var(--" + palette[i % palette.length] + ")"; });
  function colorFor(cat){
    if(CAT_COLORS[cat]) return CAT_COLORS[cat];
    var i = Math.abs(hash(cat)) % palette.length;
    return "var(--" + palette[i] + ")";
  }
  function hash(s){ var h=0; for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i); h|=0;} return h; }

  document.getElementById("listTitle").textContent = CONFIG.LIST_TITLE;
  document.title = CONFIG.LIST_TITLE + " — Family Grocery List";

  var els = {
    root: document.getElementById("listRoot"),
    outCount: document.getElementById("outCount"),
    inCount: document.getElementById("inCount"),
    tabs: document.querySelectorAll(".tab"),
    search: document.getElementById("searchBox"),
    name: document.getElementById("newItemName"),
    cat: document.getElementById("newItemCategory"),
    addBtn: document.getElementById("addBtn"),
    syncDot: document.getElementById("syncDot"),
    syncText: document.getElementById("syncText")
  };

  CATEGORIES.forEach(function(c){
    var o = document.createElement("option");
    o.value = c; o.textContent = c;
    els.cat.appendChild(o);
  });

  var state = { tab: "out", search: "", items: [], editingNotes: new Set() };

  // ---- Storage layer ---------------------------------------------------
  var remote = !!CONFIG.API_URL;

  function setSync(mode){
    els.syncDot.className = "sync-dot " + (mode === "busy" ? "busy" : mode === "on" ? "" : "off");
    els.syncText.textContent = mode === "busy" ? "Syncing…" : mode === "on" ? "Synced" : "Local";
  }

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function loadLocal(){
    try{
      var raw = localStorage.getItem("pantry_items_v1");
      if(raw) return JSON.parse(raw);
    }catch(e){}
    return [
      {id:uid(), name:"Milk", category:"Dairy & Eggs", status:"out", notes:"2%, not whole"},
      {id:uid(), name:"Eggs", category:"Dairy & Eggs", status:"in", notes:""},
      {id:uid(), name:"Bananas", category:"Produce", status:"out", notes:""},
      {id:uid(), name:"Spinach", category:"Produce", status:"in", notes:""},
      {id:uid(), name:"Chicken breast", category:"Meat & Seafood", status:"out", notes:"the big pack, freezes fine"},
      {id:uid(), name:"Paper towels", category:"Household", status:"in", notes:""},
      {id:uid(), name:"Tortilla chips", category:"Snacks", status:"in", notes:""},
      {id:uid(), name:"Olive oil", category:"Pantry", status:"in", notes:""}
    ];
  }
  function saveLocal(){
    localStorage.setItem("pantry_items_v1", JSON.stringify(state.items));
  }

  function apiCall(action, payload){
    setSync("busy");
    var body = Object.assign({action:action}, payload || {});
    return fetch(CONFIG.API_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify(body)
    }).then(function(r){ return r.json(); })
      .finally(function(){ setSync("on"); });
  }

  function refresh(){
    if(remote){
      setSync("busy");
      return fetch(CONFIG.API_URL + "?action=list")
        .then(function(r){ return r.json(); })
        .then(function(data){ state.items = data.items || []; setSync("on"); render(); })
        .catch(function(){ setSync("off"); });
    } else {
      state.items = loadLocal();
      setSync("off");
      render();
      return Promise.resolve();
    }
  }

  function addItem(name, category, status){
    name = name.trim();
    if(!name) return;
    if(remote){
      var optimistic = {id:"tmp_"+uid(), name:name, category:category, status:status, notes:""};
      state.items.push(optimistic);
      render();
      apiCall("add", {name:name, category:category, status:status}).then(function(res){
        var idx = state.items.findIndex(function(it){return it.id===optimistic.id;});
        if(idx>-1 && res && res.id){ state.items[idx] = res; render(); }
      });
    } else {
      state.items.push({id:uid(), name:name, category:category, status:status, notes:""});
      saveLocal();
      render();
    }
  }

  function toggleStatus(item){
    var next = item.status === "out" ? "in" : "out";
    var row = document.querySelector('[data-id="'+item.id+'"]');
    if(row) row.classList.add("leaving");
    setTimeout(function(){
      item.status = next;
      if(remote){ apiCall("update", {id:item.id, status:next}); }
      else { saveLocal(); }
      render();
    }, 190);
  }

  function saveNotes(item, text){
    text = text.trim();
    item.notes = text;
    state.editingNotes.delete(item.id);
    if(remote){ apiCall("update", {id:item.id, notes:text}); }
    else { saveLocal(); }
    render();
  }

  function deleteItem(item){
    state.items = state.items.filter(function(it){ return it.id !== item.id; });
    if(remote){ apiCall("delete", {id:item.id}); }
    else { saveLocal(); }
    render();
  }

  // ---- Rendering ---------------------------------------------------
  function render(){
    var filtered = state.items.filter(function(it){ return it.status === state.tab; });
    if(state.search.trim()){
      var q = state.search.trim().toLowerCase();
      filtered = filtered.filter(function(it){ return it.name.toLowerCase().indexOf(q) > -1; });
    }

    els.outCount.textContent = state.items.filter(function(it){return it.status==="out";}).length;
    els.inCount.textContent = state.items.filter(function(it){return it.status==="in";}).length;

    els.root.innerHTML = "";

    if(filtered.length === 0){
      var empty = document.createElement("div");
      empty.className = "empty";
      empty.innerHTML = state.tab === "out"
        ? '<div class="big">🧺</div><p><strong>Nothing needed right now.</strong></p><p>Add something above, or mark an in-stock item as out.</p>'
        : '<div class="big">📦</div><p><strong>Nothing marked in stock yet.</strong></p><p>Check items off your shopping list to move them here.</p>';
      els.root.appendChild(empty);
      return;
    }

    var byCat = {};
    filtered.forEach(function(it){
      var c = it.category || "Other";
      (byCat[c] = byCat[c] || []).push(it);
    });
    var cats = Object.keys(byCat).sort(function(a,b){
      var ia = CATEGORIES.indexOf(a), ib = CATEGORIES.indexOf(b);
      if(ia===-1) ia = 999; if(ib===-1) ib = 999;
      return ia - ib || a.localeCompare(b);
    });

    cats.forEach(function(cat){
      var group = document.createElement("div");
      group.className = "category-group";

      var head = document.createElement("div");
      head.className = "category-head";
      head.innerHTML = '<span class="cat-dot" style="background:'+colorFor(cat)+'"></span>' + cat +
        '<span class="cat-count">' + byCat[cat].length + '</span>';
      group.appendChild(head);

      var list = document.createElement("div");
      list.className = "item-list";
      byCat[cat].sort(function(a,b){ return a.name.localeCompare(b.name); }).forEach(function(it){
        list.appendChild(renderRow(it));
      });
      group.appendChild(list);
      els.root.appendChild(group);
    });
  }

  function renderRow(item){
    var row = document.createElement("div");
    row.className = "item-row";
    row.setAttribute("data-id", item.id);
    row.setAttribute("data-status", item.status);

    var toggle = document.createElement("button");
    toggle.className = "toggle";
    toggle.setAttribute("aria-label", item.status === "out" ? "Mark as bought" : "Mark as out of stock");
    toggle.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
    toggle.addEventListener("click", function(){ toggleStatus(item); });

    var main = document.createElement("div");
    main.className = "item-main";

    var name = document.createElement("span");
    name.className = "item-name";
    name.textContent = item.name;
    main.appendChild(name);

    if(state.editingNotes.has(item.id)){
      var input = document.createElement("input");
      input.type = "text";
      input.className = "note-input";
      input.placeholder = "Add a note…";
      input.value = item.notes || "";
      var cancelled = false;
      input.addEventListener("keydown", function(e){
        if(e.key === "Enter"){ e.preventDefault(); input.blur(); }
        else if(e.key === "Escape"){ cancelled = true; state.editingNotes.delete(item.id); render(); }
      });
      input.addEventListener("blur", function(){ if(!cancelled) saveNotes(item, input.value); });
      main.appendChild(input);
      setTimeout(function(){ input.focus(); }, 0);
    } else if(item.notes){
      var notes = document.createElement("span");
      notes.className = "item-notes";
      notes.textContent = item.notes;
      main.appendChild(notes);
    }

    var noteBtn = document.createElement("button");
    noteBtn.className = "note-btn" + (item.notes ? " has-note" : "");
    noteBtn.setAttribute("aria-label", item.notes ? "Edit note for " + item.name : "Add note to " + item.name);
    noteBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>';
    noteBtn.addEventListener("click", function(){
      if(state.editingNotes.has(item.id)) state.editingNotes.delete(item.id);
      else state.editingNotes.add(item.id);
      render();
    });

    var del = document.createElement("button");
    del.className = "del";
    del.setAttribute("aria-label", "Delete " + item.name);
    del.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
    del.addEventListener("click", function(){ deleteItem(item); });

    row.appendChild(toggle);
    row.appendChild(main);
    row.appendChild(noteBtn);
    row.appendChild(del);
    return row;
  }

  // ---- Events ---------------------------------------------------
  els.tabs.forEach(function(btn){
    btn.addEventListener("click", function(){
      els.tabs.forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      state.tab = btn.getAttribute("data-tab");
      render();
    });
  });

  els.search.addEventListener("input", function(){ state.search = els.search.value; render(); });

  function doAdd(){
    addItem(els.name.value, els.cat.value, state.tab);
    els.name.value = "";
    els.name.focus();
  }
  els.addBtn.addEventListener("click", doAdd);
  els.name.addEventListener("keydown", function(e){ if(e.key === "Enter") doAdd(); });

  document.addEventListener("visibilitychange", function(){
    if(!document.hidden && remote) refresh();
  });
  if(remote){ setInterval(refresh, 25000); }

  refresh();
})();
</script>
</body>
</html>
